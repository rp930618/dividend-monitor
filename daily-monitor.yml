# ============================================
# v8.1 红利策略监测 — GitHub Actions 工作流
# ============================================
# 调度：每日北京时间 13:30 运行（UTC 05:30）
# 支持手动触发（workflow_dispatch）
# ============================================

name: Dividend Strategy v8 Daily Monitor

on:
  schedule:
    # UTC 05:30 = 北京时间 13:30
    - cron: '30 5 * * 1-5'
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发原因'
        required: false
        default: '手动运行监测脚本'

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 缓存 pip 依赖
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 5. 运行监测脚本
      - name: Run dividend monitor
        env:
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          DIVIDEND_CONFIG: config.yaml
        run: |
          cd ${{ github.workspace }}
          python main.py
        continue-on-error: true

      # 6. 上传日志为 Artifact
      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: monitor-logs-${{ github.run_id }}
          path: |
            dividend_monitor.log
            *.log
          retention-days: 30
          if-no-files-found: ignore

      # 7. 失败时发送告警（通过企业微信）
      - name: Send failure alert
        if: failure()
        env:
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
        run: |
          if [ -n "$WECHAT_WEBHOOK_URL" ]; then
            curl -s -X POST "$WECHAT_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"[告警] 红利策略监测脚本执行失败\\n仓库: ${{ github.repository }}\\n分支: ${{ github.ref_name }}\\n运行ID: ${{ github.run_id }}\\n时间: $(date -u +'%Y-%m-%d %H:%M UTC')\\n请检查日志。\"}}"
          fi
