name: Daily Dividend Monitor

on:
  schedule:
    - cron: '25 5 * * 1-5'   # 北京时间周一至周五 13:25
  workflow_dispatch:          # 支持手动触发（用于错过定时任务时补跑）

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run monitor
        env:
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
        run: python main.py

      - name: Commit state (prevent 60-day disable)
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # v8.3-fix: 强制添加 monitor_state.json（核心状态文件，必须持久化）
          git add -f monitor_state.json || true
          git add -A || true
          # 只在有变更时提交，避免空提交
          git diff --cached --quiet || git commit -m "Auto: daily state update $(date -u +%Y-%m-%d)"
          git push || true
