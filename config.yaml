# -------------------------------------------------
# 14. 补位机制（v8.3 新增：清仓后替补规则）
# -------------------------------------------------
replacement_policy:
  enabled: true
  description: "风控清仓后的补位机制 — 7天冷却期 + 观察清单筛选"

  # 冷却期：风控清仓后进入冷静观察期
  cooling_off_days: 7

  # 补位触发条件（候选标的必须同时满足）
  entry_conditions:
    min_score_ratio: 0.95        # 评分 >= 持仓最低评分 × 0.95
    min_dividend_yield_ratio: 0.80  # 股息率 >= 被清仓标的 × 0.8
    max_valuation_ratio: 1.2     # 估值不高于被清仓标的1.2倍
    min_consecutive_dividend_years: 3  # 过去3年连续分红
    st_excluded: true            # 排除ST标的
    min_avg_daily_turnover_million: 100  # 日均成交额>=1亿元

  # 优先级排序规则
  priority_rules:
    primary_sort: "composite_score_desc"
    industry_max_weight_pct: 25   # 单一行业权重上限25%
    pe_historical_percentile_threshold: 70  # PE历史5年分位>70%降级
    min_dividend_yield_pct: 3.0   # 股息率<3%降级

  # 无合适补位标的时的资金处理
  fallback_action: "cash_pool"   # 进入现金池按ERP管理

# -------------------------------------------------
# 15. 一票否决规则（v8.3 新增：硬性排除条件）
# -------------------------------------------------
veto_rules:
  description: "满足任一条件即直接排除，不进入评分环节"
  conditions:
    - name: "roe_consecutive_decline"
      enabled: true
      consecutive_years: 3
      roe_threshold: 0.10         # ROE连续3年下降且最新<10%
    - name: "cashflow_consecutive_decline"
      enabled: true
      consecutive_years: 2
      decline_pct_threshold: 0.30  # 经营现金流连续2年下降且降幅>30%
    - name: "dividend_unsustainable"
      enabled: true
      payout_to_operating_cashflow_max: 1.00  # 分红/经营现金流>100%
    - name: "high_debt"
      enabled: true
      debt_to_asset_max: 0.60      # 资产负债率>60%
